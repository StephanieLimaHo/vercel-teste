<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu Projeto</title>
</head>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: sans-serif;
        background-color: #000;
        color: #fff;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .container {
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    h1 {
        font-size: 2.5rem;
    }

    p {
        font-size: 1.2rem;
        color: #aaa;
    }
</style>

<body>
    <div class="container">
        <h1>Olá, Stephanie! 👋</h1>
        <p>Meu primeiro deploy na Vercel</p>
    </div>
</body>

</html>
